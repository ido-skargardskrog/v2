<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min interaktiva karta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    #infoRuta {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid #333;
      border-radius: 8px;
      background-color: #f0f0f0;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <h1>Välkommen till Idö!</h1>
  <p>Tryck på det område du vill veta mer om.</p>

  <img src="karta.png" usemap="#minKarta" alt="Min karta">

  <map name="minKarta">
    <area shape="rect" coords="324,537,225,463" alt="Gästhamn" title="Gästhamn" href="https://idoskargardskrog.se/index.php/gasthamn/" target="_blank">
    <area shape="poly" coords="597,587,686,586,687,656,596,656" alt="Trollstig" title="Trollstig" href="#" onclick="visaInfo('Trollstig','På idö finns en trollstig som passar perfekt för såväl liten som stor. Den sträcker sig runt den lilla ön bakom glassboden som man tar sig till via en träbro. Längsvägen möts man av fina klippor, havsbrisar och små trollfigurer som vaktar stigen.')">
    <area shape="poly" coords="249,279,249,363,356,362,356,279" alt="Restaurang" title="Restaurang" href="https://idoskargardskrog.se/index.php/2022/10/30/ido-skargardskrog/" target="_blank">
  </map>

  <div id="infoRuta">
    Klicka på ett område på kartan för att se information här.
  </div>

  <script>
    function visaInfo(namn, text) {
      const ruta = document.getElementById('infoRuta');
      ruta.innerHTML = `<h2>${namn}</h2><p>${text}</p>`;
    }
  </script>

</body>
</html>
