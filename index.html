<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min interaktiva karta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    #infoRuta {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid #333;
      border-radius: 8px;
      background-color: #f0f0f0;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <h1>Välkommen till Idö! </h1>
  <p>Tryck på det område du vill veta mer om.</p>

  <img src="karta.png" usemap="#minKarta" alt="Min karta">

  <map name="minKarta">
   <area target="" alt="Gästhamn" title="Gästhamn" href="https://idoskargardskrog.se/index.php/gasthamn/" coords="324,537,225,463" shape="rect">
    <area target="" alt="Trollstig" title="Trollstig" href="https://idoskargardskrog.se/index.php/2024/09/07/orn-och-salsafari-2/" coords="597,587,686,586,687,656,596,656" shape="poly">
    <area target="" alt="Restaurang" title="Restaurang" href="https://idoskargardskrog.se/index.php/2022/10/30/ido-skargardskrog/" coords="249,279,249,363,356,362,356,279" shape="poly">område på kartan.')">
  </map>

  <div id="infoRuta">
    Klicka på ett område på kartan för att se information här.
  </div>

  <script>
    function visaInfo(namn, text) {
      const ruta = document.getElementById('infoRuta');
      ruta.innerHTML = `<h2>${namn}</h2><p>${text}</p>`;
    }
  </script>

</body>

</html>
